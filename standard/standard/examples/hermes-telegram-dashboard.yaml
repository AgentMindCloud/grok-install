version: "1.1"
name: "Hermes Telegram Dashboard"
description: "AI-powered admin dashboard for your Telegram groups, powered by Grok"
repository: "https://github.com/AgentMindCloud/grok-install"
deploy:
  target: "railway"
  env:
    TELEGRAM_TOKEN:
      prompt: "Paste your Telegram Bot Token (get it from @BotFather on Telegram)"
      example: "123456:ABC-DEF1234ghIkl-zyx57W2v1u123ew11"
    GROK_API_KEY:
      prompt: "Paste your Grok API Key (from grok.x.ai)"
      example: "gsk_xxxxxxxxxxxxxxxxxxxxxxxx"
on_install:
  welcome_message: "Hi! I'm Hermes, your new Grok-powered Telegram dashboard. I can help moderate groups, summarize chats, and more. What would you like to do first?"
  suggested_commands:
    - "Show me the latest messages in my group"
    - "Summarize today's activity"
    - "Help me write a welcome message for new members"
