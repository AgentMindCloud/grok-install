version: "1.1"
name: "Smart Twitter Reply Bot"
description: "AI agent that intelligently replies to mentions and DMs using Grok on X"
repository: "https://github.com/AgentMindCloud/grok-install"
deploy:
  target: "railway"
  env:
    X_API_KEY:
      prompt: "Paste your X API Key (get it from developer.x.com)"
      example: "x-abc123def456..."
    GROK_API_KEY:
      prompt: "Paste your Grok API Key (from grok.x.ai)"
      example: "gsk_xxxxxxxxxxxxxxxxxxxxxxxx"
on_install:
  welcome_message: "Hi! I'm your new Smart Twitter Reply Bot, powered by Grok. I'll help you reply to mentions, DMs, and build engagement on X. Ready to get started?"
  suggested_commands:
    - "Reply to my latest mentions"
    - "Analyze my last 10 posts for engagement ideas"
    - "Help me write a viral thread"
    - "What's trending on X right now?"
