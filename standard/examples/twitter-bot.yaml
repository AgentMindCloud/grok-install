version: "2.12"
name: "Smart Twitter Reply Bot"
description: "Intelligent replies to mentions that trigger other agents"
repository: "https://github.com/AgentMindCloud/twitter-reply-bot"
category: "twitter"
tags: ["reply-bot", "automation", "social", "orchestration"]
featured: true
ecosystem: ["grok", "x", "twitter"]

# Safety & Verification 2.0 (Phase 9)
safety:
  pre_install_scan: true
  verified_by_grok: true
  scan_summary_visible: true
  minimum_keys_only: true

llm:
  provider: "xai"
  model: "grok-4"
  api_key_env: "GROK_API_KEY"

# Analytics & Insights
analytics:
  enabled: true
  public_insights: true

# Advanced Discovery
discovery:
  verified_orchestration: true

# Multi-Agent Orchestration
orchestration:
  enabled: true
  role: "listener"
  can_trigger: ["hermes"]
  can_be_triggered_by: []
  triggers:
    - event: "mention"
      action: "forward_to_dashboard"
      target_agents: ["hermes"]
  safety:
    permission_check: true
    approval_required: true
    verified_orchestration: true

# Environment variables (Grok asks privately)
deploy:
  env:
    X_API_KEY: "Ask the user for their X API key"
    GROK_API_KEY: "Ask the user for their Grok API key"

# Deployment targets
preferred_deploy: ["railway", "render", "fly", "local"]
mode: "simple"

# Credits (strongly recommended)
credits:
  standard: "grok-install"
  author: "@JanSol0s"
  url: "https://github.com/AgentMindCloud/grok-install"
  version: "2.12"
  message: "Powered by grok-install open standard"
