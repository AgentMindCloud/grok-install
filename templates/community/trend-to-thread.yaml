version: "2.14"
name: trend-to-thread
description: Monitors X trends and drafts a full thread on topics you care about.
runtime:
  engine: grok
  model: grok-4
deploy:
  targets:
    - worker
updated_at: "2026-05-10"
entrypoint: .grok/grok-workflow.yaml
python_version: ">=3.11"
env:
  - XAI_API_KEY
  - X_BEARER_TOKEN
  - X_ACCESS_TOKEN
  - X_ACCESS_SECRET
schedule:
  interval: 30m
visuals:
  accent_color: "#FF7A3D"
  theme: cinnabar-glass
  palette:
    bg: "#0D0D0D"
    panel: "#1C1C1E"
    accent: "#FF7A3D"
    accent_soft: "rgba(199,62,29,0.20)"
    text: "#F5F5F5"
    muted: "rgba(245,245,245,0.50)"
  preview_card:
    style: cinnabar-glass
    title: trend-to-thread
    subtitle: Trends in. Threads out. Behind an approval gate.
    poster: docs/posters/trend-to-thread.svg
    gradient:
      from: "#FF7A3D"
      to: "#C73E1D"
      angle: 180
    glow:
      enabled: true
      color: "#FF7A3D"
      intensity: 0.45
    animation:
      type: pulse
      duration_ms: 2400
      respect_reduced_motion: true
  auto_generate:
    demo_media: true
    demo_length_seconds: 45
    demo_resolution: 1280x720
    demo_caption: "30m trend sweep → draft thread → approval gate"
