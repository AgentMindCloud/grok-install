<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Agents • grok-install</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; }
  </style>
</head>
<body style="background: #0a0a0a; color: #fff; font-family: system-ui, sans-serif; margin: 0; padding: 0;">
  <div style="max-width: 900px; margin: 40px auto; padding: 20px;">
    <h1 style="text-align: center; font-size: 2.8rem; background: linear-gradient(90deg, #00f0ff, #a020f0); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">
      My Agents
    </h1>
    <p style="text-align: center; color: #aaa; margin-bottom: 40px;">
      Installed via grok-install • Powered by Grok on X
    </p>

    <div id="agents-list" style="display: grid; gap: 20px;">
      <!-- Grok will dynamically populate installed agents here -->
      <div style="background: rgba(255,255,255,0.05); border-radius: 16px; padding: 24px; border: 1px solid #00f0ff33;">
        <p style="color: #888; text-align: center;">No agents installed yet.<br>Try installing one from the <a href="https://agentmindcloud.github.io/grok-install/" style="color: #00f0ff;">docs site</a>.</p>
      </div>
    </div>

    <div style="margin-top: 60px; text-align: center; font-size: 14px; color: #666;">
      <p><strong>New in v2.0:</strong> Say <code>@grok my agents</code> on X to open this dashboard.<br>
      Grok now tracks your installs, shows live status, and adds one-tap restart / update buttons.</p>
    </div>
  </div>

  <script>
    // Placeholder for future Grok-side dynamic loading
    console.log("my-agents.html loaded – ready for Grok activation");
