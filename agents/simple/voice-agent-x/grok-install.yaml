version: "2.14"
name: voice-agent-x
description: Speak a post, review the transcript, approve, publish.
runtime:
  engine: grok
  model: grok-4
deploy:
  targets:
    - cli
updated_at: "2026-05-10"
entrypoint: .grok/grok-workflow.yaml
python_version: ">=3.11"
env:
  - XAI_API_KEY
  - X_BEARER_TOKEN
  - X_ACCESS_TOKEN
  - X_ACCESS_SECRET
visuals:
  accent_color: "#f472b6"
  theme: futuristic
  palette:
    bg: "#0b0f17"
    panel: "#121826"
    accent: "#f472b6"
    accent_soft: "#3a1530"
    text: "#e6e8ef"
    muted: "#8b93a7"
  preview_card:
    style: futuristic
    title: voice-agent-x
    subtitle: Speak it. Review it. Approve it. Publish it.
    poster: docs/posters/voice-agent-x.svg
    gradient:
      from: "#0b0f17"
      to: "#3a1530"
      angle: 160
    glow:
      enabled: true
      color: "#f472b6"
      intensity: 0.5
    animation:
      type: waveform
      duration_ms: 1800
      respect_reduced_motion: true
  haptics:
    on_record_start: light
    on_transcript_ready: medium
    on_approval_required: heavy
    on_publish_success: success
    respect_system_preferences: true
  accessibility:
    high_contrast: true
    captions_required: true
    captions_language: en
    screen_reader_labels: true
    reduced_motion_fallback: static_poster
    minimum_contrast_ratio: 7.0
    voice_feedback: true
