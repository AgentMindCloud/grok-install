runtime:
  engine: grok
  model: grok-4
deploy:
  targets:
    - cli
updated_at: "2026-05-10"
entrypoint: .grok/grok-workflow.yaml
python_version: ">=3.11"
env:
  - XAI_API_KEY
  - X_BEARER_TOKEN
schedule:
  interval: 6h
