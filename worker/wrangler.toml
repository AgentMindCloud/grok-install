# Cloudflare Worker config for the grok-install hosted mint flow.
# See worker/README.md for deployment + binding setup.

name = "grok-install"
main = "src/index.js"
compatibility_date = "2026-04-28"
compatibility_flags = ["nodejs_compat"]

[vars]
PRODUCT_NAME = "grok-install"
GITHUB_OWNER_ORG = "AgentMindCloud"
PUBLIC_BASE_URL = "https://agentmindcloud.github.io/grok-install"

[[kv_namespaces]]
binding = "GROK_INSTALL_KV"
# Set via `wrangler secret put NAME` or repo Settings → Secrets
# (Run `npx wrangler kv namespace create GROK_INSTALL_KV` to provision and paste the returned id.)
id = "REPLACE_WITH_KV_NAMESPACE_ID"

# Secrets required (set via `npx wrangler secret put NAME`):
#   XAI_API_KEY      — Bearer token for xAI API (Grok)
#   X_CLIENT_ID      — X/Twitter OAuth 2.0 client id
#   X_CLIENT_SECRET  — X/Twitter OAuth 2.0 client secret
# GitHub App credentials are NOT wrangler secrets — they are provisioned at runtime
# via the /setup-app endpoint and stored in KV under `gh-app:credentials`.
