# Cloudflare Worker config for the grok-install hosted mint flow.
# See worker/README.md for deployment + binding setup.
# See worker/DEPLOY.md for the full step-by-step deployment runbook.
# The comments in this file are a quick reference only — DEPLOY.md is canonical.

name = "grok-install"
main = "src/index.js"
compatibility_date = "2026-04-28"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

# Cloudflare account id.
#   - CI: provided via the CLOUDFLARE_ACCOUNT_ID env var, sourced from the
#     repo secret of the same name (see .github/workflows/release.yml).
#   - Local / manual deploys: either export CLOUDFLARE_ACCOUNT_ID in your
#     shell OR uncomment the line below and paste your account id.
#   - The account id is NOT a secret — it is a public routing identifier
#     and is safe to commit to this file if you prefer that over the env var.
# account_id = "YOUR_CLOUDFLARE_ACCOUNT_ID"

[vars]
PRODUCT_NAME = "grok-install"
GITHUB_OWNER_ORG = "AgentMindCloud"
PUBLIC_BASE_URL = "https://agentmindcloud.github.io/grok-install"

# KV namespace binding — configured for the AgentMindCloud production
# deployment. The id is NOT a secret — it is a public routing handle and is
# safe to commit. For forks or fresh Cloudflare accounts, see worker/DEPLOY.md
# §3 for the one-time `wrangler kv namespace create` procedure.
[[kv_namespaces]]
binding = "GROK_INSTALL_KV"
id = "11d7541c50c84a83ae02891e9e908726"

# Secrets — set with `npx wrangler secret put <NAME>` from this worker/
# directory. Wrangler will prompt interactively for the value. Values are
# stored encrypted in your Cloudflare account, NOT in this file or the repo.
#
#   `XAI_API_KEY`
#       Bearer token used to call the xAI API (Grok).
#       Obtain from: the xAI dashboard at https://console.x.ai
#
#   `X_CLIENT_ID`
#       OAuth 2.0 client id for the X (Twitter) sign-in flow.
#       Obtain from: the X developer portal at https://developer.x.com
#
#   `X_CLIENT_SECRET`
#       OAuth 2.0 client secret paired with X_CLIENT_ID above.
#       Obtain from: the same X developer portal app as X_CLIENT_ID.
#
# GitHub App credentials are a DIFFERENT kind of credential — they are NOT
# wrangler secrets. They are provisioned at runtime via the /setup-app
# endpoint and stored in KV under the `gh-app:credentials` key.

# ---------------------------------------------------------------------------
# Deployment
# ---------------------------------------------------------------------------
# Recommended: tag-driven CI. Pushing a `v*.*.*` tag triggers the
# deploy-worker job in .github/workflows/release.yml, which runs
# `npx wrangler deploy` for you.
#   Required repo secrets for CI:
#     - CLOUDFLARE_API_TOKEN   (API token with Workers deploy permission)
#     - CLOUDFLARE_ACCOUNT_ID  (the account id this Worker lives in)
# Manual: after one-time KV + secrets setup, run `npx wrangler deploy`
# from this worker/ directory.
# Full procedure (including KV creation, secret rotation, and rollback):
# see worker/DEPLOY.md.
