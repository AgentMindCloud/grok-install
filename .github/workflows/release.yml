---
name: release

"on":
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          name: "grok-install ${{ github.ref_name }}"
          body: |
            ## grok-install ${{ github.ref_name }}

            Auto-generated release for tag `${{ github.ref_name }}`.

            - Spec: [`spec/v2.14/spec.md`](spec/v2.14/spec.md)
            - Schema: [`schemas/v2.14/schema.json`](schemas/v2.14/schema.json)
            - Migration: [`docs/migration/v2.13-to-v2.14.md`](docs/migration/v2.13-to-v2.14.md)
            - Visuals reference: [`docs/v2.14/visuals.md`](docs/v2.14/visuals.md)

            See commit history below for full changes.
