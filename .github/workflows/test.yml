name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ['3.11', '3.12']
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install
        run: pip install -e ".[dev]"
      - name: Run pytest
        run: pytest tests/ --tb=short

  wheel-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Build wheel
        run: |
          pip install build
          python -m build --wheel
      - name: Install wheel in clean venv
        run: |
          python -m venv /tmp/smoke-venv
          /tmp/smoke-venv/bin/pip install dist/*.whl
      - name: Smoke test --version
        run: /tmp/smoke-venv/bin/grok-install --version
      - name: Smoke test validate from outside source tree
        run: |
          mkdir -p /tmp/smoke-test
          cp tests/fixtures/valid_minimal.yaml /tmp/smoke-test/manifest.yaml
          cd /tmp/smoke-test
          /tmp/smoke-venv/bin/grok-install validate manifest.yaml
