name: secret-scan

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Weekly sweep of the whole repo in case a secret was committed between PRs.
    - cron: "0 6 * * 1"

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history for scheduled scans; PRs only need the diff.
          fetch-depth: ${{ github.event_name == 'schedule' && 0 || 1 }}

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
