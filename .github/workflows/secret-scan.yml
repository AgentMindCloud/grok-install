---
name: secret-scan

"on":
  push:
    branches: [main]
  pull_request:
  schedule:
    # Weekly sweep of the whole repo in case a secret was committed between PRs.
    - cron: "0 6 * * 1"

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so gitleaks can resolve <SHA>^..<SHA> on PR commits and
          # do a proper sweep on the weekly schedule.
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
