---
name: secret-scan

"on":
  push:
    branches: [main]
  pull_request:
  schedule:
    # Weekly sweep of the whole repo in case a secret was committed between PRs.
    - cron: "0 6 * * 1"

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so PR diffs and weekly sweeps can both scan everything they need.
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          set -euo pipefail
          v=8.21.2
          curl -sL "https://github.com/gitleaks/gitleaks/releases/download/v${v}/gitleaks_${v}_linux_x64.tar.gz" \
            | tar -xz -C /usr/local/bin gitleaks
          gitleaks version

      - name: Scan
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            gitleaks detect --source . \
              --log-opts="${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}" \
              --redact --no-banner --exit-code 1
          else
            gitleaks detect --source . --redact --no-banner --exit-code 1
          fi
