# Deploy GitHub Pages on push to main when website/, docs/, assets/, or this
# workflow file changes. The path layout deployed to Pages is:
#
#   _site/
#     index.html        # from website/index.html
#     standard.html     # from website/standard.html
#     templates.html    # from website/templates.html
#     style.css         # from website/style.css
#     assets/           # from assets/  (canonical banner + brand kit)
#     docs/             # from docs/    (mkdocs --strict build output)
#
# Website pages reference assets via the relative path "assets/banner.svg"
# so the asset resolves once website/* is deployed flat at _site/ root.
# The mkdocs site is hosted at the /docs/ subpath under the Pages site.
#
# Pages source must be set to "GitHub Actions" in repo Settings -> Pages
# before this workflow can deploy. That toggle is a one-time admin action
# and is not performed by this workflow.

name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'website/**'
      - 'docs/**'
      - 'assets/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  pages: write
  id-token: write
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: docs/requirements.txt

      - name: Install docs requirements
        run: pip install -r docs/requirements.txt

      - name: Build mkdocs (strict)
        run: cd docs && mkdocs build --strict --site-dir ../_site/docs

      - name: Copy website pages to _site root
        run: cp -R website/. _site/

      - name: Copy assets to _site/assets
        run: cp -R assets _site/assets

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
