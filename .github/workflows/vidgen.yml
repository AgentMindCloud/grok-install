name: vidgen

on:
  push:
    paths:
      - "tools/video-generator/**"
      - ".github/workflows/vidgen.yml"
  pull_request:
    paths:
      - "tools/video-generator/**"
      - ".github/workflows/vidgen.yml"

jobs:
  python:
    name: analyzer + narration tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tools/video-generator
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'
      - name: Run pytest
        run: pytest -v

  remotion-bundle:
    name: remotion bundle smoke
    runs-on: ubuntu-latest
    needs: python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install package
        working-directory: tools/video-generator
        run: pip install -e .
      - name: Materialize a project from the committed sample
        working-directory: tools/video-generator
        run: grok-vidgen build examples/sample-repo --out /tmp/out --no-render --no-music
      - name: Find first generated project
        id: find_project
        run: echo "path=$(ls -d /tmp/out/projects/*/*/ | head -1)" >> "$GITHUB_OUTPUT"
      - name: npm install
        working-directory: ${{ steps.find_project.outputs.path }}
        run: npm install --no-progress
      - name: remotion bundle
        working-directory: ${{ steps.find_project.outputs.path }}
        run: npx remotion bundle src/index.ts
