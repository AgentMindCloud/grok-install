name: validate-templates

on:
  pull_request:
    paths:
      - 'agents/**'

jobs:
  validate-templates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install
        run: pip install -e ".[dev]"
      - name: Validate agent manifests
        run: grok-install validate agents/
