name: validate-templates

on:
  pull_request:
    paths:
      - 'templates/**'
      - 'spec/**'
      - 'src/grok_install/**'

jobs:
  validate-templates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install
        run: pip install -e ".[dev]"
      - name: Validate bundled templates
        run: grok-install validate templates/
