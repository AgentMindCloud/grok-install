name: Feature Request
description: Suggest a new feature for the spec, tooling, or landing page
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        For spec changes, use the **Spec RFC** template instead — spec proposals require
        a more structured justification and migration path.
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Spec field / block
        - JSON Schema
        - Reference examples
        - Landing page
        - my-agents.html dashboard
        - CI / tooling
        - Documentation
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Explain the pain point without prescribing the solution yet.
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: textarea
    id: context
    attributes:
      label: Additional context
