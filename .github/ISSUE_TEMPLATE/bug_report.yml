name: Bug report
description: Something in the standard, schema, CI, or marketplace UI isn't working.
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the bug. Include the repo URL or YAML snippet if relevant.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `npm run validate -- ./my-agent.yaml`
        2. ...
    validations:
      required: true
  - type: input
    id: spec-version
    attributes:
      label: Spec version
      placeholder: "2.12"
  - type: textarea
    id: logs
    attributes:
      label: Logs / output
      render: shell
