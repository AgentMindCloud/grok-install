name: Bug Report
description: Report a problem with the spec, schema, examples, or landing page
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Before filing a bug, check existing issues and make sure CI is green on `main`.
  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - Spec (grok-install.yaml format)
        - JSON Schema validation
        - Reference examples
        - Landing page / index.html
        - my-agents.html dashboard
        - CI / GitHub Actions
        - Documentation
    validations:
      required: true
  - type: input
    id: spec-version
    attributes:
      label: Spec version
      placeholder: "e.g. v2.13"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: yaml
    attributes:
      label: Minimal grok-install.yaml (if relevant)
      render: yaml
  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues
          required: true
        - label: This is reproducible on the latest commit of `main`
          required: true
