<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2400 1000" width="2400" height="1000" preserveAspectRatio="xMidYMid meet" role="img" aria-label="grok-install — the open standard for Grok agents on X">
  <defs>
    <radialGradient id="amber-glow" cx="70%" cy="20%" r="50%">
      <stop offset="0%" stop-color="#FF7A3D" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#FF7A3D" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cinnabar-glow" cx="20%" cy="80%" r="60%">
      <stop offset="0%" stop-color="#C73E1D" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#C73E1D" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="hero-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FF7A3D"/>
      <stop offset="100%" stop-color="#C73E1D"/>
    </linearGradient>
    <filter id="hero-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="0" y="0" width="2400" height="1000" fill="#0D0D0D"/>
  <rect x="0" y="0" width="2400" height="1000" fill="url(#amber-glow)"/>
  <rect x="0" y="0" width="2400" height="1000" fill="url(#cinnabar-glow)"/>

  <text x="80" y="80" font-family="'IBM Plex Mono','SF Mono',Menlo,Consolas,monospace" font-size="16" font-weight="700" fill="#F5F5F5" fill-opacity="0.6" letter-spacing="1.6">CINNABAR GLASS · PLATE N° 01 · GROK-INSTALL</text>

  <text x="1200" y="480" font-family="Geist,system-ui,-apple-system,'Segoe UI',sans-serif" font-size="180" font-weight="800" fill="url(#hero-grad)" filter="url(#hero-glow)" text-anchor="middle">grok-install</text>

  <text x="1200" y="580" font-family="'IBM Plex Mono','SF Mono',Menlo,Consolas,monospace" font-size="36" font-weight="700" fill="#F5F5F5" letter-spacing="1.8" text-anchor="middle">THE OPEN STANDARD FOR GROK AGENTS ON X</text>

  <rect x="600" y="780" width="1200" height="100" rx="20" fill="#1C1C1E" fill-opacity="0.6" stroke="#F5F5F5" stroke-opacity="0.08" stroke-width="1.5"/>
  <text x="1200" y="840" font-family="'IBM Plex Mono','SF Mono',Menlo,Consolas,monospace" font-size="22" font-weight="500" fill="#F5F5F5" fill-opacity="0.9" letter-spacing="1.76" text-anchor="middle">SPEC v2.14  ·  8 TEMPLATES  ·  MINT-AS-A-SERVICE  ·  APACHE 2.0</text>

  <text x="2320" y="940" font-family="Geist,system-ui,-apple-system,'Segoe UI',sans-serif" font-size="24" font-style="italic" fill="#F5F5F5" fill-opacity="0.7" text-anchor="end">mint an agent in sixty seconds.</text>
</svg>
