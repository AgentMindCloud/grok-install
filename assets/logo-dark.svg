<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80" role="img" aria-label="grok-install">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00F0FF"/>
      <stop offset="60%" stop-color="#7C3AED"/>
    </linearGradient>
  </defs>

  <!-- Background pill -->
  <rect x="0" y="0" width="320" height="80" rx="12" ry="12" fill="#0A0A0F"/>

  <!-- Accent line top -->
  <rect x="0" y="0" width="320" height="2" rx="1" fill="url(#textGrad)" opacity="0.8"/>

  <!-- Icon mark: stylized "G" bracket -->
  <g transform="translate(18, 20)" filter="url(#glow)">
    <!-- Left bracket -->
    <path d="M 0 0 L 0 40 L 8 40" stroke="#00F0FF" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Right bracket -->
    <path d="M 30 0 L 30 40 L 22 40" stroke="#7C3AED" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Inner dot -->
    <circle cx="15" cy="20" r="3" fill="#00F0FF" opacity="0.9"/>
  </g>

  <!-- Wordmark -->
  <text x="68" y="30"
    font-family="'Space Grotesk', 'JetBrains Mono', 'Courier New', monospace"
    font-size="22"
    font-weight="700"
    letter-spacing="-0.04em"
    fill="url(#textGrad)"
    filter="url(#glow)">grok-install</text>

  <!-- Tagline -->
  <text x="68" y="52"
    font-family="'Inter', system-ui, sans-serif"
    font-size="11"
    font-weight="400"
    letter-spacing="0.06em"
    fill="#8B8B9A">THE UNIVERSAL STANDARD FOR GROK-NATIVE AGENTS</text>

  <!-- Version badge -->
  <rect x="68" y="58" width="36" height="14" rx="3" fill="#1F1F2A"/>
  <text x="86" y="69"
    font-family="'JetBrains Mono', 'Courier New', monospace"
    font-size="8"
    font-weight="500"
    text-anchor="middle"
    fill="#00F0FF">v2.13</text>
</svg>
