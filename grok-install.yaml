---
# yaml-language-server: $schema=https://raw.githubusercontent.com/AgentMindCloud/grok-install/main/schemas/v2.14/schema.json
# grok-install.yaml – Root reference template (v2.14)
# Copy this (or a customized version) to the root of any agent repo.

version: "2.14"
name: "Example Agent Template"
description: "Official grok-install reference template — fill in your agent's details"
repository: "https://github.com/AgentMindCloud/grok-install"
category: "x-native"
tags: ["template", "reference", "x-native"]
featured: false
ecosystem: ["grok", "x"]

# LLM configuration
llm:
  provider: "xai"
  model: "grok-4"
  api_key_env: "GROK_API_KEY"

# Tool declarations (JSON Schema per tool — required from v2.13 onward)
tools:
  - name: "example_tool"
    description: "Replace this with a real tool your agent exposes"
    parameters:
      type: "object"
      properties:
        input:
          type: "string"
      required: ["input"]
    returns:
      type: "object"
      properties:
        result:
          type: "string"

# Rate limiting — declarative, per-tool
rate_limits:
  example_tool:
    qps: 1.0
    daily_cap: 500

# Hard cost stops
cost_limits:
  daily_usd: 3.00
  on_limit: "block"

# Native X agent runtime
x_native_runtime:
  type: "reply-bot"
  permissions: ["tweet.read", "tweet.write"]
  grok_orchestrator: true
  one_click_x_deploy: true

# Grok intelligence layer
intelligence_layer:
  function_calling: true
  real_time_tools: true
  multi_agent_swarm: true

# Orchestration (optional)
orchestration:
  enabled: true
  role: "example"
  can_trigger: []
  can_be_triggered_by: []
  triggers: []

# Safety & verification
safety:
  pre_install_scan: true
  verified_by_grok: true
  scan_summary_visible: true
  minimum_keys_only: true

# Deployment targets
deployment:
  preferred: ["railway", "vercel", "docker"]
  targets:
    - railway
    - vercel
    - docker

# Post-install experience
on_install:
  welcome: "{{name}} is now live. Type /help for commands."
  suggested_commands:
    - "/status"
    - "/help"

# Promotion (opt-in)
promotion:
  auto_welcome: true
  auto_share: true
  weekly_highlight: true
  featured: false
  builder_credits: "@JanSol0s"
  support_link: "https://github.com/sponsors/JanSol0s"

# Update strategy
update_strategy: "semver"

# Attribution (recommended)
credits:
  standard: "grok-install"
  author: "@JanSol0s"
  url: "https://github.com/AgentMindCloud/grok-install"
  version: "2.14"
  message: "Powered by grok-install open standard"
