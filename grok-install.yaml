# grok-install.yaml – Root Template (v2.11)
# This is the official reference template for the grok-install standard.
# Place a copy of this (or a customized version) at the root of any agent repo.

version: "2.11"
name: "Example Agent Template"
description: "Official grok-install reference template with full Phase 10 support"
repository: "https://github.com/AgentMindCloud/grok-install"
category: "example"
tags: ["template", "reference", "x-native"]
featured: false
ecosystem: ["grok", "x"]

# === PHASE 10 NEW BLOCKS ===
# Native X Agent Runtime (Goal 1)
x_native_runtime:
  type: "reply-bot"          # options: reply-bot | dm-handler | trend-monitor | custom
  permissions: ["tweet.read", "tweet.write", "dm.read"]
  grok_orchestrator: true
  one_click_x_deploy: true

# Grok Intelligence Layer (Goal 2)
intelligence_layer:
  function_calling: true
  real_time_tools: true
  multi_agent_swarm: true
  grok_coordinates: true
  ai_suggested_teams: true

# Advanced Trust & Reputation (Goal 3)
reputation:
  public_score: true
  verified_by_grok: true
  scan_history: true
  automated_recommendations: true

# Safety & Verification 2.0 (from Phase 9 – kept unchanged)
safety:
  pre_install_scan: true
  verified_by_grok: true
  scan_summary_visible: true
  minimum_keys_only: true

# Orchestration & Triggers (from previous phases – kept unchanged)
orchestration:
  enabled: true
  role: "example"
  can_trigger: []
  can_be_triggered_by: []
  visual_builder: true
  ai_suggested_patterns: true
  triggers: []     
  
# LLM Configuration           # most keys are now optional
llm:                          # Recommended multi-LLM section
  provider: "xai"             # xai | openai | anthropic | ollama | custom
  model: "grok-4"
  api_key_env: "GROK_API_KEY" # Grok will ask privately only for truly required keys

# Deployment Targets
deployment:
  preferred: ["railway", "vercel", "docker"]
  targets:
    - railway
    - vercel
    - docker
    
# Multi-Agent Orchestration (Phase 7)
orchestration:
  enabled: false
  role: "agent"

# Post-install experience
on_install:
  welcome: "🎉 {{name}} is now LIVE! Type /help for commands."
  suggested_commands:
    - "/status"
    - "/help"

# Update & maintenance
update_strategy: "semver"

# Credits (strongly recommended for attribution)
credits:
  standard: "grok-install"
  author: "@JanSol0s"
  url: "https://github.com/AgentMindCloud/grok-install"
  version: "2.11"
  message: "Powered by grok-install open standard"
