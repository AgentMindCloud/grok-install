# grok-install.yaml – Official Template (v2.10)
# Copy this file into the root of your repo to make your AI agent one-click installable on X

version: "2.10"
name: "Your Agent Name"
description: "One clear sentence describing what your agent does"
repository: "https://github.com/yourusername/your-repo-name"
category: "telegram"          # telegram | discord | twitter | web | other
tags: ["ai", "bot", "automation"]
featured: false
ecosystem: ["grok", "x"]

# Safety & Verification 2.0 (Phase 9)
safety:
  pre_install_scan: true
  verified_by_grok: true
  scan_summary_visible: true
  minimum_keys_only: true     # most keys are now optional

llm:                          # Recommended multi-LLM section
  provider: "xai"             # xai | openai | anthropic | ollama | custom
  model: "grok-4"
  api_key_env: "GROK_API_KEY" # Grok will ask privately only for truly required keys

# Deployment settings
mode: "simple"
preferred_deploy: ["railway", "vercel", "fly", "render", "local"]

# Multi-Agent Orchestration (Phase 7)
orchestration:
  enabled: false
  role: "agent"

# Post-install experience
on_install:
  welcome: "🎉 {{name}} is now LIVE! Type /help for commands."
  suggested_commands:
    - "/status"
    - "/help"

# Update & maintenance
update_strategy: "semver"

# Credits – strongly recommended
credits:
  standard: "grok-install"
  author: "@JanSol0s"
  url: "https://github.com/AgentMindCloud/grok-install"
  version: "2.10"
  message: "Powered by grok-install open standard"
