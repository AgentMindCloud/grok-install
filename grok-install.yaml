# grok-install v2.1 – Official Template
# Copy this file into the root of your repo to make your AI agent one-click installable on X

version: "2.1"
name: "Your Agent Name"
description: "One clear sentence describing what your agent does"
repository: "https://github.com/yourusername/your-repo-name"
category: "telegram"                  # telegram | twitter | discord | web | other
tags: ["ai", "bot", "automation"]
ecosystem: ["grok", "x"]              # optional but recommended

# Deployment settings
deploy:
  target: "railway"
  preferred_deploy: ["railway", "vercel", "fly", "render", "local"]

# Private guided prompts – secrets stay private with Grok
prompts:
  - key: "TELEGRAM_BOT_TOKEN"
    message: "Please paste your Telegram bot token from @BotFather (this stays private)"
  - key: "GROK_API_KEY"
    message: "Please paste your Grok / xAI API key (this stays private)"
  - key: "X_API_KEY"
    message: "Please paste your X API key (optional – stays private)"

# Optional advanced settings
safety_checklist:
  - no_hardcoded_secrets
  - uses_official_sdks

on_install:
  welcome: "🎉 {{name}} is now LIVE! Type /help for commands."
  suggested_commands:
    - "/status"
    - "/help"

# Update & maintenance
update_strategy: "semver"
